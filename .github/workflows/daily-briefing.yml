name: Daily briefing

# Cron is in UTC. 7:30 AM America/New_York is:
#   EST (winter): 12:30 UTC
#   EDT (summer): 11:30 UTC
# GitHub's scheduled crons can fire 5–15 min late — accept "by 7:45 AM ET".
# Both fire to cover DST; the script is idempotent within a day (state-sheet
# dedup, ack/vote rows are append-only) so the redundant fire is harmless.
on:
  schedule:
    - cron: "30 11 * * *"   # 7:30 AM EDT (summer)
    - cron: "30 12 * * *"   # 7:30 AM EST (winter)
  workflow_dispatch: {}     # manual "Run workflow" button in the GitHub UI

# Required for deploy-pages to publish + for the briefing's
# alert_slack_failure to hit Slack on failure.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time. If a manual run + scheduled run
# overlap, queue them; don't abort either.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore Google OAuth credentials
        # Base64-encoded so the JSON can't be mangled by shell escaping,
        # Notepad BOMs, smart quotes, etc. James base64s locally with
        # PowerShell, pastes into the _B64 secrets, we decode here.
        env:
          GOOGLE_CLIENT_SECRET_B64: ${{ secrets.GOOGLE_CLIENT_SECRET_B64 }}
          GOOGLE_TOKEN_B64:         ${{ secrets.GOOGLE_TOKEN_B64 }}
        run: |
          mkdir -p ~/.config/2ai-briefing
          echo "$GOOGLE_CLIENT_SECRET_B64" | base64 -d > ~/.config/2ai-briefing/client_secret.json
          echo "$GOOGLE_TOKEN_B64"         | base64 -d > ~/.config/2ai-briefing/token.json
          # Sanity check: confirm both files are valid JSON before the
          # briefing script tries to read them. Fail fast with a clear
          # message if decode produced garbage.
          python -c "import json; json.load(open('$HOME/.config/2ai-briefing/client_secret.json')); print('client_secret.json: OK')"
          python -c "import json; json.load(open('$HOME/.config/2ai-briefing/token.json'));         print('token.json: OK')"

      - name: Run daily briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
          PYTHONIOENCODING:  utf-8
        run: python daily_briefing.py

      # Publish the interactive dashboard to GitHub Pages.
      # daily_briefing.py wrote docs/<slug>.html plus robots.txt and
      # a blank index. Pages serves the static contents.
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
